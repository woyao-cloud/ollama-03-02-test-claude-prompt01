# =============================================
# Spring Boot Team 环境配置文件
# =============================================

spring:
  config:
    activate:
      on-profile: local

  # 数据源配置
  datasource:
    url: jdbc:postgresql://localhost:5432/user_management
    username: devuser
    # teamuser
    password: devpassword
    # teampassword123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      pool-name: UMS-HikariPool
      connection-test-query: SELECT 1

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        jdbc.lob.non_contextual_creation: true

  # Flyway 配置 - 在 Docker 环境中禁用，因为迁移已通过 db-seed 服务执行
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false
    clean-disabled: true

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # Kafka 配置
  kafka:
    bootstrap-servers: localhost:29092
    producer:
      acks: all
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: ums-team-group
      auto-offset-reset: earliest
      enable-auto-commit: true
      auto-commit-interval: 5000
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# JWT 配置
jwt:
  secret-key: ${JWT_SECRET_KEY:team-jwt-secret-key-change-in-production}
  access-token:
    expiration: 86400000  # 24小时
  refresh-token:
    expiration: 604800000  # 7天

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024

# 日志配置
logging:
  level:
    com.usermanagement: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/ums/application.log
    max-size: 100MB
    max-history: 30

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: team

# 应用自定义配置
app:
  cors:
    allowed-origins: "http://localhost,http://localhost:3000,http://localhost:80"
  audit:
    enabled: true
    kafka-topic: audit-logs
