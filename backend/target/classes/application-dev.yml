spring:
  datasource:
    url: jdbc:h2:mem:usermanagement;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# JWT Configuration (RSA keys - in production use environment variables or K8s secrets)
jwt:
  private-key: ${JWT_PRIVATE_KEY:MIICXQIBAAKBgQC5Z5KJ4h0vIHY3JdX7lXy8n1j0YlX5hY7k5v5w5z3r1p0j5k3l7m9n1b2v4x6z8}
  public-key: ${JWT_PUBLIC_KEY:MIIBCgKBgQC5Z5KJ4h0vIHY3JdX7lXy8n1j0YlX5hY7k5v5w5z3r1p0j5k3l7m9n1b2v4x6z8}

# Redis Configuration
spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
