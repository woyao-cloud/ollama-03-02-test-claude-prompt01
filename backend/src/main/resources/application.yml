spring:
  application:
    name: user-management-system
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: dev

  kafka:
    bootstrap-servers: localhost:29092
    # ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      retries: 3
      acks: all
      compression-type: snappy
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: audit-log-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.usermanagement.service.dto
        spring.json.value.default.type: com.usermanagement.service.dto.AuditLogEvent

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        connection:
          isolation: 2
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    org.springframework.security: DEBUG
    com.usermanagement: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

server:
  port: 8080
  servlet:
    context-path: /api

# Application-specific Kafka settings
app:
  kafka:
    enabled: false
    topics:
      audit-logs: audit-logs
      audit-logs-retry: audit-logs-retry
      audit-logs-dlt: audit-logs-dlt
    partitions: 3
    replication-factor: 1
