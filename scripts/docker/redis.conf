# Redis 配置文件
# Team 环境优化配置

# 基本配置
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# 日志配置
loglevel notice
logfile ""

# 持久化配置
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF 配置
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# 内存配置
maxmemory 512mb
maxmemory-policy allkeys-lru

# 客户端配置
maxclients 10000

# 安全配置
protected-mode no

# 性能配置
hz 10
dynamic-hz yes

# 线程配置
io-threads 4
io-threads-do-reads yes
