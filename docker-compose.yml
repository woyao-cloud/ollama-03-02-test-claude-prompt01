version: '3.8'

# =============================================
# 本地开发环境 Docker Compose 配置
# 用途: 本地开发、单元测试、集成测试
# 特点: 热重载、调试支持、测试数据自动初始化
# =============================================

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: ums-postgres-dev
    environment:
      POSTGRES_DB: user_management
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      # Flyway 迁移脚本在应用启动时执行
      # 测试数据通过 db-seed 服务执行
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d user_management"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - ums-dev-network
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.7
      -c wal_buffers=16MB
      -c default_statistics_target=100

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ums-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ums-dev-network

  # Zookeeper (Kafka 依赖)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ums-zookeeper-dev
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - ums-dev-network

  # Kafka 消息队列
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ums-kafka-dev
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    networks:
      - ums-dev-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ums-kafka-ui-dev
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-dev
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - ums-dev-network

  # 数据库测试数据初始化服务
  db-seed:
    image: postgres:15-alpine
    container_name: ums-db-seed-dev
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # 建表脚本（Flyway 迁移脚本）- 必须先执行
      - ./backend/src/main/resources/db/migration:/migrations:ro
      # 测试数据脚本
      - ./scripts/test-data:/scripts:ro
      - ./scripts/docker/wait-for-db.sh:/wait-for-db.sh:ro
    environment:
      PGPASSWORD: devpassword
      PGHOST: postgres
      PGUSER: devuser
      PGDATABASE: user_management
    command: >
      sh -c "
        echo '等待数据库就绪...' &&
        /wait-for-db.sh postgres 5432 devuser devpassword &&
        echo '============================================' &&
        echo '第一步: 创建数据库表结构' &&
        echo '============================================' &&
        for f in /migrations/V*.sql; do
          if [ -f \"\$$f\" ]; then
            echo \"执行建表脚本: \$$(basename \$$f)\" &&
            psql -h postgres -U devuser -d user_management -f \"\$$f\" || { echo \"错误: \$$f 执行失败\"; exit 1; };
          fi
        done &&
        echo '表结构创建完成' &&
        echo '============================================' &&
        echo '第二步: 插入测试数据' &&
        echo '============================================' &&
        for f in /scripts/01-*.sql /scripts/02-*.sql /scripts/03-*.sql /scripts/04-*.sql /scripts/05-*.sql /scripts/06-*.sql; do
          if [ -f \"\$$f\" ]; then
            echo \"执行测试数据: \$$(basename \$$f)\" &&
            psql -h postgres -U devuser -d user_management -f \"\$$f\" || echo \"警告: \$$f 执行失败\";
          fi
        done &&
        echo '============================================' &&
        echo '数据库初始化完成!' &&
        echo '============================================'
      "
    networks:
      - ums-dev-network
    profiles:
      - seed
    restart: "no"

  # Spring Boot 后端 (开发模式 - 热重载)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      target: development
    container_name: ums-backend-dev
    environment:
      # 数据库配置
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_management
      SPRING_DATASOURCE_USERNAME: devuser
      SPRING_DATASOURCE_PASSWORD: devpassword
      # Redis 配置
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      # Kafka 配置
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # JWT 配置
      JWT_SECRET_KEY: dev-jwt-secret-key-change-in-production-minimum-256-bits-required-for-security
      JWT_ACCESS_TOKEN_EXPIRATION: 86400000
      JWT_REFRESH_TOKEN_EXPIRATION: 604800000
      # 应用配置
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080
      # 日志级别
      LOGGING_LEVEL_COM_USERMANAGEMENT: DEBUG
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: DEBUG
      # 开发特性
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "true"
    ports:
      - "8080:8080"
      - "5005:5005"  # 远程调试端口
    volumes:
      - ./backend:/app:cached
      - maven_cache:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ums-dev-network
    command: >
      sh -c "
        echo '等待数据库迁移完成...' &&
        sleep 10 &&
        ./mvnw spring-boot:run \
          -Dspring-boot.run.jvmArguments='-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005'
      "

  # Next.js 前端 (开发模式)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ums-frontend-dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app:cached
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend
    networks:
      - ums-dev-network
    command: >
      sh -c "
        npm install &&
        npm run dev
      "

  # pgAdmin 数据库管理工具
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ums-pgadmin-dev
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_dev_data:/var/lib/pgadmin
      - ./scripts/docker/pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ums-dev-network

  # MailHog 邮件测试服务
  mailhog:
    image: mailhog/mailhog:latest
    container_name: ums-mailhog-dev
    ports:
      - "1025:1025"  # SMTP 端口
      - "8025:8025"  # Web UI 端口
    networks:
      - ums-dev-network

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  pgadmin_dev_data:
    driver: local
  maven_cache:
    driver: local
  frontend_node_modules:
    driver: local
  frontend_next:
    driver: local

networks:
  ums-dev-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
