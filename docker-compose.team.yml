version: '3.8'

# =============================================
# Team 共享开发环境 Docker Compose 配置
# 用途: 团队协作开发、功能验证、集成测试
# 特点: 稳定、预构建镜像、共享测试数据
# =============================================

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: ums-postgres-team
    environment:
      POSTGRES_DB: user_management
      POSTGRES_USER: teamuser
      POSTGRES_PASSWORD: teampassword123
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_team_data:/var/lib/postgresql/data
      # 挂载初始化脚本
      - ./scripts/docker/init-scripts:/docker-entrypoint-initdb.d:ro
      # 挂载建表脚本 (Flyway 迁移脚本)
      - ./backend/src/main/resources/db/migration:/docker-entrypoint-initdb.d/migrations:ro
      # 挂载测试数据脚本
      - ./scripts/test-data:/docker-entrypoint-initdb.d/test-data:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamuser -d user_management"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ums-team-network
    command: >
      postgres
      -c max_connections=300
      -c shared_buffers=512MB
      -c effective_cache_size=1536MB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=200
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=5242kB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ums-redis-team
    ports:
      - "6379:6379"
    volumes:
      - redis_team_data:/data
      - ./scripts/docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ums-team-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ums-zookeeper-team
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_team_data:/var/lib/zookeeper/data
      - zookeeper_team_logs:/var/lib/zookeeper/log
    networks:
      - ums-team-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ums-kafka-team
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
    volumes:
      - kafka_team_data:/var/lib/kafka/data
    networks:
      - ums-team-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ums-kafka-ui-team
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: team-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      AUTH_TYPE: DISABLED
    networks:
      - ums-team-network
    restart: unless-stopped

  # 数据库初始化服务 (Team 环境手动初始化)
  db-seed:
    image: postgres:15-alpine
    container_name: ums-db-seed-team
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # 建表脚本 (Flyway 迁移脚本)
      - ./backend/src/main/resources/db/migration:/migrations:ro
      # 测试数据脚本
      - ./scripts/test-data:/scripts:ro
      - ./scripts/docker/wait-for-db.sh:/wait-for-db.sh:ro
    environment:
      PGPASSWORD: teampassword123
      PGHOST: postgres
      PGUSER: teamuser
      PGDATABASE: user_management
    command: >
      sh -c "
        echo '等待数据库就绪...' &&
        /wait-for-db.sh postgres 5432 teamuser teampassword123 &&
        echo '============================================' &&
        echo '第一步: 创建数据库表结构' &&
        echo '============================================' &&
        for f in /migrations/V*.sql; do
          if [ -f \"\$$f\" ]; then
            echo \"执行建表脚本: \$$(basename \$$f)\" &&
            psql -h postgres -U teamuser -d user_management -f \"\$$f\" || { echo \"错误: \$$f 执行失败\"; exit 1; };
          fi
        done &&
        echo '表结构创建完成' &&
        echo '============================================' &&
        echo '第二步: 插入测试数据' &&
        echo '============================================' &&
        for f in /scripts/01-*.sql /scripts/02-*.sql /scripts/03-*.sql /scripts/04-*.sql /scripts/05-*.sql /scripts/06-*.sql; do
          if [ -f \"\$$f\" ]; then
            echo \"执行测试数据: \$$(basename \$$f)\" &&
            psql -h postgres -U teamuser -d user_management -f \"\$$f\" || echo \"警告: \$$f 执行失败\";
          fi
        done &&
        echo '============================================' &&
        echo '数据库初始化完成!' &&
        echo '============================================'
      "
    networks:
      - ums-team-network
    profiles:
      - seed
    restart: "no"

  # Spring Boot 后端 (Team 环境 - 使用预构建镜像)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: usermanagement/backend:team-${BUILD_NUMBER:-latest}
    container_name: ums-backend-team
    environment:
      # 数据库配置
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_management
      SPRING_DATASOURCE_USERNAME: teamuser
      SPRING_DATASOURCE_PASSWORD: teampassword123
      # Redis 配置
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_TIMEOUT: 2000
      SPRING_REDIS_LETTUCE_POOL_MAX_ACTIVE: 8
      SPRING_REDIS_LETTUCE_POOL_MAX_IDLE: 8
      # Kafka 配置
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_PRODUCER_ACKS: all
      SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET: earliest
      # JWT 配置
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-team-jwt-secret-key-change-in-production-minimum-256-bits-required-for-security}
      JWT_ACCESS_TOKEN_EXPIRATION: 86400000
      JWT_REFRESH_TOKEN_EXPIRATION: 604800000
      # 应用配置
      SPRING_PROFILES_ACTIVE: team
      SERVER_PORT: 8080
      # 连接池配置
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 20
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 5
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: 300000
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: 1200000
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 20000
      # 日志配置
      LOGGING_LEVEL_COM_USERMANAGEMENT: INFO
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: WARN
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ums-team-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Next.js 前端 (Team 环境 - 使用预构建镜像)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: usermanagement/frontend:team-${BUILD_NUMBER:-latest}
    container_name: ums-frontend-team
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ums-team-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # pgAdmin
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ums-pgadmin-team
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_team_data:/var/lib/pgadmin
      - ./scripts/docker/pgadmin-servers-team.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ums-team-network
    restart: unless-stopped

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: ums-nginx-team
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./scripts/docker/nginx.team.conf:/etc/nginx/nginx.conf:ro
      - ./scripts/docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - ums-team-network
    restart: unless-stopped

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: ums-prometheus-team
    ports:
      - "9090:9090"
    volumes:
      - ./scripts/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_team_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - ums-team-network
    restart: unless-stopped

  # Grafana 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: ums-grafana-team
    ports:
      - "3001:3000"
    volumes:
      - grafana_team_data:/var/lib/grafana
      - ./scripts/docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./scripts/docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
    networks:
      - ums-team-network
    restart: unless-stopped

volumes:
  postgres_team_data:
    driver: local
  redis_team_data:
    driver: local
  pgadmin_team_data:
    driver: local
  zookeeper_team_data:
    driver: local
  zookeeper_team_logs:
    driver: local
  kafka_team_data:
    driver: local
  prometheus_team_data:
    driver: local
  grafana_team_data:
    driver: local

networks:
  ums-team-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16
